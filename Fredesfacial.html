<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redes Sociales | EIMO</title>

<style>
:root {
  --dark: #190019;
  --primary: #2B124C;
  --secondary: #522B5B;
  --accent: #854F6C;
  --soft: #DFB6B2;
  --light: #FBE4D8;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Inter, Arial, sans-serif;
  background: linear-gradient(180deg, var(--soft), var(--primary));
  color: white;
}

/* NAV */
.navbar {
  width: 92%;
  margin: 24px auto;
  padding: 18px 24px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 50px;
  display: flex;
  justify-content: space-between;
}

nav {
  display: flex;
  gap: 25px;
}

nav a {
  color: var(--light);
  text-decoration: none;
}

.logo {
  font-weight: bold;
}

/* HERO */
.hero {
  width: 92%;
  margin: 60px auto;
  text-align: center;
}

.hero h1 {
  font-size: 60px;
  margin-bottom: 10px;
}

.hero p {
  color: var(--soft);
}

/* BOTONES REDES */
.social-buttons {
  margin-top: 30px;
  display: flex;
  justify-content: center;
  gap: 20px;
}

.btn {
  background: var(--accent);
  color: white;
  padding: 14px 25px;
  border-radius: 30px;
  text-decoration: none;
}

/* FEED */
.feed {
  width: 92%;
  margin: 60px auto;
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
}

.post {
  background: rgba(255,255,255,0.08);
  border-radius: 25px;
  overflow: hidden;
  transition: 0.3s;
}

.post:hover {
  transform: translateY(-10px);
}

.post img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.post p {
  padding: 15px;
  color: var(--soft);
}

/* CTA */
.cta {
  width: 92%;
  margin: 100px auto;
  text-align: center;
}

.cta h2 {
  margin-bottom: 15px;
}

/* FOOTER */
footer {
  width: 92%;
  margin: 100px auto;
  padding: 50px;
  border-radius: 30px;
  background: var(--dark);
  text-align: center;
}

footer p {
  color: var(--soft);
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .feed {
    grid-template-columns: 1fr;
  }

  .hero h1 {
    font-size: 40px;
  }

  .social-buttons {
    flex-direction: column;
  }
}

/* ===== RESPONSIVE GLOBAL ===== */

img {
  max-width: 100%;
  height: auto;
  display: block;
}

.hero,
.about,
.doctor,
.reviews {
  width: 92%;
  margin: 60px auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 40px;
  align-items: center;
}

.service-grid,
.grid,
.feature-grid,
.feed {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

h1 {
  font-size: clamp(32px, 6vw, 72px) !important;
  line-height: 1.1;
}

h2 {
  font-size: clamp(26px, 5vw, 56px) !important;
  line-height: 1.1;
}

.navbar {
  flex-wrap: wrap !important;
  gap: 20px;
}

nav {
  flex-wrap: wrap !important;
  justify-content: center;
}

.btn {
  transition: 0.3s ease;
}

.btn:hover {
  transform: translateY(-3px);
}

@media (max-width: 1024px) {

  .hero,
  .about,
  .doctor,
  .reviews {
    grid-template-columns: 1fr !important;
  }

  .hero-image img,
  .doctor img,
  .about img {
    height: 420px !important;
  }
}

@media (max-width: 768px) {

  body {
    overflow-x: hidden;
  }

  .navbar {
    flex-direction: column !important;
    border-radius: 30px !important;
    padding: 20px !important;
  }

  nav {
    width: 100%;
    justify-content: center;
  }

  .hero,
  .services,
  .about,
  .doctor,
  .reviews,
  footer {
    width: 95% !important;
  }

  .hero-actions {
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
  }

  .service-grid,
  .grid,
  .feature-grid,
  .feed {
    grid-template-columns: 1fr !important;
  }

  .services,
  footer {
    padding: 28px !important;
    border-radius: 28px !important;
  }

  .hero img,
  .doctor img,
  .about img,
  .service-card img,
  .post img {
    height: 300px !important;
  }

  .btn {
    width: 100%;
    text-align: center;
  }
}

@media (max-width: 480px) {

  h1 {
    font-size: 34px !important;
  }

  h2 {
    font-size: 28px !important;
  }

  p {
    font-size: 15px;
  }

  .hero img,
  .doctor img,
  .about img {
    height: 240px !important;
  }

  .service-card,
  .card,
  .post {
    border-radius: 20px !important;
  }
}

</style>
</head>
