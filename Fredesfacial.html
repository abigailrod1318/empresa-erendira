<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redes Sociales | EIMO</title>

<style>
:root {
  --dark: #190019;
  --primary: #2B124C;
  --secondary: #522B5B;
  --accent: #854F6C;
  --soft: #DFB6B2;
  --light: #FBE4D8;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Inter, Arial, sans-serif;
  background: linear-gradient(180deg, var(--soft), var(--primary));
  color: white;
}

/* NAV */
.navbar {
  width: 92%;
  margin: 24px auto;
  padding: 18px 24px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 50px;
  display: flex;
  justify-content: space-between;
}

nav {
  display: flex;
  gap: 25px;
}

nav a {
  color: var(--light);
  text-decoration: none;
}

.logo {
  font-weight: bold;
}

/* HERO */
.hero {
  width: 92%;
  margin: 60px auto;
  text-align: center;
}

.hero h1 {
  font-size: 60px;
  margin-bottom: 10px;
}

.hero p {
  color: var(--soft);
}

/* BOTONES REDES */
.social-buttons {
  margin-top: 30px;
  display: flex;
  justify-content: center;
  gap: 20px;
}

.btn {
  background: var(--accent);
  color: white;
  padding: 14px 25px;
  border-radius: 30px;
  text-decoration: none;
}

/* FEED */
.feed {
  width: 92%;
  margin: 60px auto;
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
}

.post {
  background: rgba(255,255,255,0.08);
  border-radius: 25px;
  overflow: hidden;
  transition: 0.3s;
}

.post:hover {
  transform: translateY(-10px);
}

.post img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.post p {
  padding: 15px;
  color: var(--soft);
}

/* CTA */
.cta {
  width: 92%;
  margin: 100px auto;
  text-align: center;
}

.cta h2 {
  margin-bottom: 15px;
}

/* FOOTER */
footer {
  width: 92%;
  margin: 100px auto;
  padding: 50px;
  border-radius: 30px;
  background: var(--dark);
  text-align: center;
}

footer p {
  color: var(--soft);
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .feed {
    grid-template-columns: 1fr;
  }

  .hero h1 {
    font-size: 40px;
  }

  .social-buttons {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <a class="btn"  href="FfacialCorporal.html">Facial y corporal Eimo</a>
  <nav>
    <a class="btn" href="Ferendira.html">Dr. Erendira Reyes</a>
    <a class="btn" href="Fconocefacial.html">Conócenos</a>
    <a class="btn" href="Fservicios.html">Servicios</a>
    <a class="btn" href="Fredesfacial.html">BLOG</a>
    <a class="btn" href="index.html">Dental Eimo</a>
  </nav>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Síguenos</h1>
  <p>Resultados reales, tips y contenido exclusivo</p>

  <div class="social-buttons">
    <a href="https://instagram.com/TUCUENTA" class="btn">Instagram</a>
    <a href="https://tiktok.com/@TUCUENTA" class="btn">TikTok</a>
  </div>
</section>

<!-- FEED -->
<section class="feed">

  <div class="post">
    <img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5">
    <p>Antes y después ✨</p>
  </div>

  <div class="post">
    <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
    <p>Blanqueamiento dental 🦷</p>
  </div>

  <div class="post">
    <img src="https://images.unsplash.com/photo-1629909613654-28e377c37b09">
    <p>Proceso de ortodoncia 📸</p>
  </div>

</section>

<!-- CTA -->
<section class="cta">

  <a href="agenda.html" class="btn">Reservar ahora</a>
</section>

<!-- FOOTER -->
<footer>
  <h2>EIMO</h2>
  <p>Salud, estética y bienestar</p>
</footer>

</body>
</html>
