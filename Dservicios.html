<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios | Clínica Dental EIMO</title>


<style>
:root {
  --primary: #84bac9;
  --secondary: #ceaea5;
  --accent: #1fb5b7;
  --light: #c0dae8;
  --dark: #000000;
  --white: #ffffff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Inter, Arial, sans-serif;
  background: var(--light);
  color: var(--dark);
}

.navbar {
 .navbar {
  width: 92%;
  margin: 24px auto;
  padding: 18px 24px;
  background: var(--white);
  border-radius: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 10px 30px rgba(0,0,0,0.06);
}
}

nav {
  display: flex;
  gap: 28px;
}

nav a {
  text-decoration: none;
  color: var(--dark);
    text-decoration: none;
  font-weight: 500;
}

.btn {
  background: var(--accent);
  color: var(--white);
  padding: 12px 20px;
  border-radius: 30px;
  text-decoration: none;
}

.hero {
  width: 92%;
  margin: 40px auto;
  padding: 20px;
  background: var(--primary);
  border-radius: 60px;
  text-align: center;
  color: var(--white);
}

.services {
  width: 92%;
  margin: 60px auto;
  background: var(--white);
  padding: 40px;
  border-radius: 60px;
}

.service-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
}

.service-card {
  background: var(--white);
  padding: 15px;
  border-radius: 60px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.service-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 60px;
}

.service-card h3 {
  color: var(--primary);
}

footer {
  width: 92%;
  margin: 80px auto 30px;
  background: var(--primary);
  color: var(--white);
  padding: 50px;
  border-radius: 60px;
  text-align: center;
}

footer p {
    margin: 20px;
  color: var(--dark );
}

footer .btn {
  background: var(--white);
  color: var(--dark);
}




@media (max-width: 900px) {
  .service-grid {
    grid-template-columns: 1fr;
  }
}

/* ===== RESPONSIVE GLOBAL ===== */

img {
  max-width: 100%;
  height: auto;
  display: block;
}

.hero,
.about,
.doctor,
.reviews {
  width: 92%;
  margin: 60px auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 40px;
  align-items: center;
}

.service-grid,
.grid,
.feature-grid,
.feed {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

h1 {
  font-size: clamp(32px, 6vw, 72px) !important;
  line-height: 1.1;
}

h2 {
  font-size: clamp(26px, 5vw, 56px) !important;
  line-height: 1.1;
}

.navbar {
  flex-wrap: wrap !important;
  gap: 20px;
}

nav {
  flex-wrap: wrap !important;
  justify-content: center;
}

.btn {
  transition: 0.3s ease;
}

.btn:hover {
  transform: translateY(-3px);
}

@media (max-width: 1024px) {

  .hero,
  .about,
  .doctor,
  .reviews {
    grid-template-columns: 1fr !important;
  }

  .hero-image img,
  .doctor img,
  .about img {
    height: 420px !important;
  }
}

@media (max-width: 768px) {

  body {
    overflow-x: hidden;
  }

  .navbar {
    flex-direction: column !important;
    border-radius: 30px !important;
    padding: 20px !important;
  }

  nav {
    width: 100%;
    justify-content: center;
  }

  .hero,
  .services,
  .about,
  .doctor,
  .reviews,
  footer {
    width: 95% !important;
  }

  .hero-actions {
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
  }

  .service-grid,
  .grid,
  .feature-grid,
  .feed {
    grid-template-columns: 1fr !important;
  }

  .services,
  footer {
    padding: 28px !important;
    border-radius: 28px !important;
  }

  .hero img,
  .doctor img,
  .about img,
  .service-card img,
  .post img {
    height: 300px !important;
  }

  .btn {
    width: 100%;
    text-align: center;
  }
}

@media (max-width: 480px) {

  h1 {
    font-size: 34px !important;
  }

  h2 {
    font-size: 28px !important;
  }

  p {
    font-size: 15px;
  }

  .hero img,
  .doctor img,
  .about img {
    height: 240px !important;
  }

  .service-card,
  .card,
  .post {
    border-radius: 20px !important;
  }
}

</style>
</head>
