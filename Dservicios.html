<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios | Clínica Dental EIMO</title>


<style>
:root {
  --primary: #84bac9;
  --secondary: #ceaea5;
  --accent: #1fb5b7;
  --light: #c0dae8;
  --dark: #000000;
  --white: #ffffff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Inter, Arial, sans-serif;
  background: var(--light);
  color: var(--dark);
}

.navbar {
 .navbar {
  width: 92%;
  margin: 24px auto;
  padding: 18px 24px;
  background: var(--white);
  border-radius: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 10px 30px rgba(0,0,0,0.06);
}
}

nav {
  display: flex;
  gap: 28px;
}

nav a {
  text-decoration: none;
  color: var(--dark);
    text-decoration: none;
  font-weight: 500;
}

.btn {
  background: var(--accent);
  color: var(--white);
  padding: 12px 20px;
  border-radius: 30px;
  text-decoration: none;
}

.hero {
  width: 92%;
  margin: 40px auto;
  padding: 20px;
  background: var(--primary);
  border-radius: 60px;
  text-align: center;
  color: var(--white);
}

.services {
  width: 92%;
  margin: 60px auto;
  background: var(--white);
  padding: 40px;
  border-radius: 60px;
}

.service-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
}

.service-card {
  background: var(--white);
  padding: 15px;
  border-radius: 60px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.service-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 60px;
}

.service-card h3 {
  color: var(--primary);
}

footer {
  width: 92%;
  margin: 80px auto 30px;
  background: var(--primary);
  color: var(--white);
  padding: 50px;
  border-radius: 60px;
  text-align: center;
}

footer p {
    margin: 20px;
  color: var(--dark);
}

footer .btn {
  background: var(--white);
  color: var(--dark);
}




@media (max-width: 900px) {
  .service-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <header class="navbar">
  <a  class="btn  "href="index.html">Dental Eimo</a>
  <nav>
       <a href="Ddentista.html">Dr. Erendira Reyes</a>
    <a href="Dconocenos.html">Conocenos</a>
    <a href="Dservicios.html">Servicios</a>
    <a href="Dblog.html">Blog</a>
    <a href="Dagendarcita.html">Agendar cita</a>
  </nav>
    <a class="btn" href="FfacialCorporal.html">Facial y corporal </a>
</header>
</div>

<section class="hero">
  <h1>Servicios Dentales</h1>
</section>

<section class="services">
  <div class="service-grid">

    <div class="service-card">
      <img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5">
      <h3>Limpieza</h3>
      <p>Cuidado básico dental.</p>
    </div>

    <div class="service-card">
      <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
      <h3>Blanqueamiento</h3>
      <p>Sonrisa más brillante.</p>
    </div>

    <div class="service-card">
      <img src="https://images.unsplash.com/photo-1629909613654-28e377c37b09">
      <h3>Ortodoncia</h3>
      <p>Alineación dental.</p>
    </div>

  </div>
</section>

<footer>
  <h2>Agenda tu cita</h2>
  <p>Atención profesional</p>
  <a href="" class="btn">Reservar</a>
</footer>

</body>
</html>
